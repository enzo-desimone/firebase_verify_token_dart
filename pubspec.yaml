name: firebase_verify_token_dart
description: A highly performant Dart package to verify and decode Firebase Auth ID tokens (JWTs) across multiple Firebase projects using Google's public keys.
version: 2.3.0
homepage: https://github.com/enzo-desimone/firebase_verify_token_dart

environment:
  sdk: '>=3.1.2 <4.0.0'

dependencies:
  http: ^1.6.0
  intl: ^0.20.2
  jose_plus: ^0.4.7
  ntp_dart: ^1.3.0


dev_dependencies:
  flutter_lints: ^6.0.0
  test: ^1.31.1


